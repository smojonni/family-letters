    function rc4(key, data) {
      let S = [];
      for (let i = 0; i < 256; i++) {
        S[i] = i;
      }
      let j = 0;
      for (let i = 0; i < 256; i++) {
        j = (j + S[i] + key[i % key.length]) % 256;
        let temp = S[i];
        S[i] = S[j];
        S[j] = temp;
      }
      let i = 0;
      j = 0;
      let out = [];
      for (let k = 0; k < data.length; k++) {
        i = (i + 1) % 256;
        j = (j + S[i]) % 256;
        let temp = S[i];
        S[i] = S[j];
        S[j] = temp;
        out.push(data[k] ^ S[(S[i] + S[j]) % 256]);
      }
      return new Uint8Array(out);
    }
    
    function unlock() {
      const pw = document.getElementById('pw-input').value;
      const key = Array.from(pw).map(c => c.charCodeAt(0));
      
      // Decode Base64
      const binaryString = atob(encryptedData);
      const bytes = new Uint8Array(binaryString.length);
      for (let i = 0; i < binaryString.length; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      
      try {
        const decryptedBytes = rc4(key, bytes);
        const decoder = new TextDecoder('utf-8');
        const decrypted = decoder.decode(decryptedBytes);
        
        if (decrypted && decrypted.includes("<!DOCTYPE html>")) {
          document.open();
          document.write(decrypted);
          document.close();
        } else {
          showError();
        }
      } catch(e) {
        showError();
      }
    }
    
    function showError() {
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('pw-input').value = '';
    }
    
    document.getElementById('unlock-btn').addEventListener('click', unlock);
    document.getElementById('pw-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') unlock();
    });
