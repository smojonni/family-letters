<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battani Family Letters - Letter 1</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <!-- OpenSeadragon CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
  
  <style>
    :root {
      --bg-primary: #faf8f5; /* warm cream */
      --bg-secondary: #f4edd7; /* soft parchment */
      --text-primary: #2c2520; /* deep charcoal-brown */
      --text-secondary: #6e6356; /* muted brown */
      --accent: #b37e22; /* warm golden ochre */
      --accent-hover: #916315;
      --border-color: #e5dcbd;
      --shadow-color: rgba(44, 37, 32, 0.08);
      --viewer-bg: #141210; /* dark background for viewer */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header & Player Bar */
    header {
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 0.8rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      z-index: 10;
      box-shadow: 0 2px 8px var(--shadow-color);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .header-subtitle {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Compact Elegant Audio Player */
    .player-container {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 650px;
      margin: 0.1rem auto 0 auto;
      box-shadow: 0 2px 6px var(--shadow-color);
    }

    .play-pause-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background-color: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(179, 126, 34, 0.3);
    }

    .play-pause-btn:hover {
      background-color: var(--accent-hover);
      transform: scale(1.05);
    }

    .player-timeline-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .timeline {
      width: 100%;
      height: 6px;
      background-color: #ebdcb1;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }

    .progress-filled {
      height: 100%;
      background-color: var(--accent);
      border-radius: 3px;
      width: 0%;
    }

    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Content Area - OSD Viewer */
    .viewer-container {
      flex: 1;
      background-color: var(--viewer-bg);
      position: relative;
      width: 100%;
      height: 100%;
    }

    #openseadragon-viewer {
      width: 100%;
      height: 100%;
    }

    /* Floating Navigation Controls */
    .osd-controls {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 5;
    }

    .osd-btn {
      background: rgba(28, 24, 21, 0.85);
      border: 1px solid rgba(229, 220, 189, 0.25);
      color: #faf8f5;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .osd-btn:hover {
      background: var(--accent);
      color: white;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(179, 126, 34, 0.3);
    }

    /* Responsive Grid for Mobile Viewports */
    @media (max-width: 600px) {
      header {
        padding: 0.6rem 1rem;
        gap: 0.4rem;
      }
      header h1 {
        font-size: 1.25rem;
      }
      .player-container {
        padding: 0.5rem 0.8rem;
        gap: 10px;
      }
      .play-pause-btn {
        width: 36px;
        height: 36px;
      }
      .osd-controls {
        bottom: 16px;
        right: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Hidden HTML5 Audio Element -->
  <audio id="audio-element" src="letter-1/Letter1.mp3" preload="metadata"></audio>

  <header>
    <div class="header-top">
      <h1>Battani Family Letters</h1>
      <span class="header-subtitle">Letter 1</span>
    </div>
    
    <!-- Sleek Horizontal Audio Player -->
    <div class="player-container">
      <button class="play-pause-btn" id="play-pause-btn" title="Play">
        <svg id="play-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pause-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      
      <div class="player-timeline-wrapper">
        <div class="timeline" id="timeline">
          <div class="progress-filled" id="progress-filled"></div>
        </div>
        <div class="time-display">
          <span id="current-time">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>
    </div>
  </header>

  <!-- OpenSeadragon Viewer takes up full remaining page -->
  <div class="viewer-container">
    <div id="openseadragon-viewer"></div>
    
    <!-- Navigation Overlay Controls -->
    <div class="osd-controls">
      <button id="osd-zoom-in" class="osd-btn" title="Zoom In">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
      </button>
      <button id="osd-zoom-out" class="osd-btn" title="Zoom Out">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
      </button>
      <button id="osd-home" class="osd-btn" title="Reset View">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </button>
    </div>
  </div>

  <script>
    // Initialize OpenSeadragon Viewer
    let viewer = OpenSeadragon({
      id: "openseadragon-viewer",
      prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
      tileSources: "letter-1/info.json",
      showNavigationControl: false, // Use our custom sepia buttons instead
      minZoomImageRatio: 0.8,
      maxZoomPixelRatio: 3.5,
      visibilityRatio: 1.0,
      constrainDuringPan: true
    });

    // Custom OSD controls bindings
    document.getElementById('osd-zoom-in').addEventListener('click', () => {
      viewer.viewport.zoomBy(1.3);
      viewer.viewport.applyConstraints();
    });

    document.getElementById('osd-zoom-out').addEventListener('click', () => {
      viewer.viewport.zoomBy(0.7);
      viewer.viewport.applyConstraints();
    });

    document.getElementById('osd-home').addEventListener('click', () => {
      viewer.viewport.goHome();
      viewer.viewport.applyConstraints();
    });

    // Custom HTML5 Audio Player Logic
    const audio = document.getElementById('audio-element');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const timeline = document.getElementById('timeline');
    const progressFilled = document.getElementById('progress-filled');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    playPauseBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
      } else {
        audio.pause();
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
      }
    });

    audio.addEventListener('timeupdate', () => {
      const percentage = (audio.currentTime / audio.duration) * 100;
      progressFilled.style.width = `${percentage}%`;
      currentTimeEl.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
    });

    // Fallback if metadata is loaded immediately from cache
    if (audio.readyState >= 1) {
      durationEl.textContent = formatTime(audio.duration);
    }

    timeline.addEventListener('click', (e) => {
      const timelineWidth = window.getComputedStyle(timeline).width;
      const timeToSeek = (e.offsetX / parseInt(timelineWidth)) * audio.duration;
      audio.currentTime = timeToSeek;
    });

    audio.addEventListener('ended', () => {
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      progressFilled.style.width = '0%';
      currentTimeEl.textContent = "0:00";
    });
  </script>
</body>
</html>
